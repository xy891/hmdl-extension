name: Build Ximalaya Extension

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Project
        # 绕过 package.json 的 build 脚本，直接用 npx 运行 vite 构建
        # 这样就不会触发 windows 的 xcopy 和 if exist 报错
        run: npx vite build

      - name: Merge Extension Assets
        # 使用 Linux 原生命令合并 ext 目录下的资源到 dist
        run: |
          mkdir -p dist/icons
          cp -r ext/icons/* dist/icons/ || true
          cp ext/manifest.json dist/
          cp ext/background.js dist/

      - name: Zip Extension
        run: |
          cd dist
          zip -r ../ximalaya-extension.zip .
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ximalaya-extension-build
          path: ximalaya-extension.zip
          retention-days: 7
